<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <style>
      .title { font: 700 30px 'Microsoft YaHei', 'SimHei', sans-serif; fill: #0f172a; }
      .stage { font: 700 20px 'Microsoft YaHei', 'SimHei', sans-serif; fill: #0f172a; }
      .text { font: 15px 'Microsoft YaHei', 'SimHei', sans-serif; fill: #334155; }
      .box { rx: 20; ry: 20; stroke-width: 2.2; }
      .line { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1280" height="760" fill="#f8fafc"/>
  <text x="640" y="54" text-anchor="middle" class="title">示意图1 系统总体架构</text>

  <rect x="80" y="130" width="260" height="160" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="210" y="170" text-anchor="middle" class="stage">数据层</text>
  <text x="210" y="205" text-anchor="middle" class="text">采区边界数据</text>
  <text x="210" y="232" text-anchor="middle" class="text">钻孔坐标与属性数据</text>
  <text x="210" y="259" text-anchor="middle" class="text">分层与规程参数数据</text>

  <rect x="410" y="130" width="260" height="160" class="box" fill="#e0f2fe" stroke="#0891b2"/>
  <text x="540" y="170" text-anchor="middle" class="stage">服务层</text>
  <text x="540" y="205" text-anchor="middle" class="text">FastAPI / Node 混合后端</text>
  <text x="540" y="232" text-anchor="middle" class="text">SQLite / Store 数据管理</text>
  <text x="540" y="259" text-anchor="middle" class="text">上传、建模、设计、导出接口</text>

  <rect x="740" y="130" width="260" height="160" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="870" y="170" text-anchor="middle" class="stage">算法层</text>
  <text x="870" y="205" text-anchor="middle" class="text">插值 / GNN 建模</text>
  <text x="870" y="232" text-anchor="middle" class="text">工作面布局与巷道生成</text>
  <text x="870" y="259" text-anchor="middle" class="text">多目标规划与接续优化</text>

  <rect x="1070" y="130" width="140" height="160" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="1140" y="170" text-anchor="middle" class="stage">表现层</text>
  <text x="1140" y="205" text-anchor="middle" class="text">前端可视化</text>
  <text x="1140" y="232" text-anchor="middle" class="text">结果图件</text>
  <text x="1140" y="259" text-anchor="middle" class="text">CAD 导出</text>

  <path d="M340 210 H410" class="line"/>
  <path d="M670 210 H740" class="line"/>
  <path d="M1000 210 H1070" class="line"/>

  <rect x="180" y="430" width="920" height="190" class="box" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="640" y="470" text-anchor="middle" class="stage">论文建议叙事方式</text>
  <text x="240" y="515" class="text">从“面向采区规划设计的一体化系统”切入，而不是只写某一个算法模块。</text>
  <text x="240" y="548" class="text">写作时按 数据层 → 服务层 → 算法层 → 输出层 组织，可自然串联可视化图、流程图和正文方法章节。</text>
  <text x="240" y="581" class="text">其中 Python 后端应作为主实现链路，Node 旧版后端作为系统演进背景补充说明。</text>
</svg>
