<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <style>
      .title { font: 700 30px 'Microsoft YaHei', 'SimHei', sans-serif; fill: #0f172a; }
      .stage { font: 700 20px 'Microsoft YaHei', 'SimHei', sans-serif; fill: #0f172a; }
      .text { font: 15px 'Microsoft YaHei', 'SimHei', sans-serif; fill: #334155; }
      .box { rx: 20; ry: 20; stroke-width: 2.2; }
      .line { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1280" height="760" fill="#f8fafc"/>
  <text x="640" y="54" text-anchor="middle" class="title">示意图2 数据流转关系</text>

  <rect x="80" y="120" width="220" height="120" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="190" y="160" text-anchor="middle" class="stage">原始数据</text>
  <text x="190" y="196" text-anchor="middle" class="text">CSV / JSON / 分层表</text>

  <rect x="380" y="120" width="220" height="120" class="box" fill="#e0f2fe" stroke="#0891b2"/>
  <text x="490" y="160" text-anchor="middle" class="stage">解析与标准化</text>
  <text x="490" y="196" text-anchor="middle" class="text">字段识别、闭合、归一化</text>

  <rect x="680" y="120" width="220" height="120" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="790" y="160" text-anchor="middle" class="stage">统一数据池</text>
  <text x="790" y="196" text-anchor="middle" class="text">boundary / boreholes / model</text>

  <rect x="980" y="120" width="220" height="120" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="1090" y="160" text-anchor="middle" class="stage">应用调用</text>
  <text x="1090" y="196" text-anchor="middle" class="text">建模、设计、规划、导出</text>

  <path d="M300 180 H380" class="line"/>
  <path d="M600 180 H680" class="line"/>
  <path d="M900 180 H980" class="line"/>

  <rect x="170" y="370" width="940" height="210" class="box" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="640" y="415" text-anchor="middle" class="stage">数据在系统中的三次变形</text>
  <text x="235" y="465" class="text">第一次：原始文件被解析成系统可识别字段，例如边界点、钻孔点、煤层属性。</text>
  <text x="235" y="500" class="text">第二次：统一数据被地质建模、工作面设计与规划模块消费，生成中间结果场和候选方案。</text>
  <text x="235" y="535" class="text">第三次：中间结果被再组织为可视化图层、评价指标、接续计划和 CAD 输出文件。</text>
</svg>
